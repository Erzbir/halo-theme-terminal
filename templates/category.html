<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = |#{page.category.title(${category.spec.displayName})} - ${site.title}|, header = null, content = ~{::content}, footer = null)}"
>
<th:block th:fragment="content">
  <div class="content">
    <div class="post">
      <h1
        class="post-title"
        th:text="'Category: '+${category.spec.displayName}+' ['+${category.status.visiblePostCount?:0}+']'">
        Category: Category name [n]
      </h1>
      <div class="post-content">
        <ul>
          <li class="post-list" th:each="post : ${posts.items}">
            <a th:href="@{${post.status.permalink}}">
              <span class="post-date" th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}">Publish Time</span>
              :: <span class="post-list-title" th:text="${post.spec.title}">Post Title</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
    <div class="pagination" th:if="${posts.hasPrevious() || posts.hasNext()}">
      <div class="pagination__buttons">
         <span th:if="${posts.hasPrevious()}">
            <a th:href="@{${posts.prevUrl}}" class="button inline prev">
              <span class="button__icon"><</span>
              <span class="button__text">Prev</span>
            </a>
          </span>
        <span th:if="${posts.hasPrevious()} and ${posts.hasNext()}">
          ::
        </span>
        <span th:if="${posts.hasNext()}">
            <a th:href="@{${posts.nextUrl}}" class="button inline next">
              <span class="button__text">Next</span>
              <span class="button__icon">></span>
            </a>
          </span>
      </div>
    </div>
  </div>
</th:block>
</html>
