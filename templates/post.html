<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = |${post.spec.title} - ${site.title}|, header = null, content = ~{::content}, footer = null)}"
>
<th:block th:fragment="content">
  <div class="content">
    <article class="post">
      <header>
        <h1 class="post-title" th:text="${post.spec.title}">Post Title</h1>
        <div class="post-meta">
          <span class="post-date" th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}">Publish Time</span>
          <span class="post-author" th:text="${post.owner.displayName}">Author</span>
        </div>
        <span class="post-tags">
        <span th:each="tag : ${post.tags}">
          <a
            th:href="@{${tag.status.permalink}}"
            th:title="${tag.spec.displayName}"
            th:text="'#'+${tag.spec.displayName}"
            class="post-tag"
          >#Tag
          </a>
        </span>
      </span>
      </header>
      <section class="post-content">
        <div th:utext="${post.content.content}" id="content">Post Content</div>
      </section>
    </article>
    <div class="toc" th:if="${theme.config.basic.show_toc}"></div>
    <div class="pagination">
      <div class="pagination__title">
        <span class="pagination__title-h">Read other posts</span>
        <hr/>
      </div>
      <div class="pagination__buttons" th:with="postCursor=${postFinder.cursor(post.metadata?.name)}">
        <span th:if="${postCursor.hasPrevious()}">
          <a th:href="@{${postCursor.previous?.status?.permalink}}" class="button prev inline">
            <span class="button__icon"><</span>
            <span class="button__text" th:text="|[${postCursor.previous?.spec?.title}]|">[prevPost]</span>
          </a>
        </span>
        <span th:if="${postCursor.hasPrevious()} and ${postCursor.hasNext()}">
          ::
        </span>
        <span th:if="${postCursor.hasNext()}">
          <a th:href="@{${postCursor.next?.status?.permalink}}" class="button next inline">
            <span class="button__text" th:text="|[${postCursor.next?.spec?.title}]|">[nextPost]</span>
            <span class="button__icon">></span>
          </a>
        </span>
      </div>
    </div>
    <div th:if="${haloCommentEnabled}">
      <h2>Comments</h2>
      <halo:comment
        group="content.halo.run"
        kind="Post"
        th:attr="name=${post.metadata.name}"
      />
    </div>
  </div>

  <script type="module" th:inline="javascript">
    window.addEventListener('load', () => {
      import('[(|${#theme.assets("/dist/main.js")}?v=${theme.spec.version}|)]').then(({generateToc, locateToc}) => {
        generateToc();
        locateToc();

        let resizeTimer;
        let isVisible = true;

        document.addEventListener('visibilitychange', () => {
          isVisible = !document.hidden;
        });

        window.addEventListener('resize', () => {
          if (!isVisible) return;

          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            requestAnimationFrame(() => {
              locateToc();
            });
          }, 200);
        });
      });
    });
  </script>
</th:block>
</html>
