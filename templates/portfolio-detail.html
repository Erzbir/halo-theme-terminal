<!DOCTYPE html>
<html
        xmlns:th="https://www.thymeleaf.org"
        th:replace="~{modules/layout :: html(title = |${project.title} - #{page.portfolio.title} - ${site.title}|, header = null, content = ~{::content}, footer = null)}"
>
<th:block th:fragment="content"
          th:with="hasCover=${project.cover != null and !project.cover.isEmpty()},
                   hasRepoUrl=${project.repoUrl != null and !project.repoUrl.isEmpty()},
                   hasDemoUrl=${project.demoUrl != null and !project.demoUrl.isEmpty()},
                   hasDocsUrl=${project.docsUrl != null and !project.docsUrl.isEmpty()},
                   hasSummary=${project.summary != null and !project.summary.isEmpty()},
                   hasContent=${project.content != null and !project.content.isEmpty()},
                   hasRenderedContent=${projectContentHtml != null and !projectContentHtml.isEmpty()},
                   platformLabel=${platformLabels != null and project.platform != null ? (platformLabels[project.platform] ?: project.platform) : project.platform},
                   typeLabel=${typeLabels != null and project.type != null ? (typeLabels[project.type] ?: project.type) : project.type}">
    <article class="post portfolio-detail-post">
        <header>
            <h1 class="post-title" th:text="${project.title}">Project Title</h1>
            <div class="post-meta portfolio-meta"
                 th:if="${project.featured == true
                         or !#strings.isEmpty(platformLabel)
                         or !#strings.isEmpty(typeLabel)
                         or (project.techStacks != null and !project.techStacks.isEmpty())
                         or (project.tags != null and !project.tags.isEmpty())}">
                <span class="post-meta portfolio-meta-line"
                      th:if="${project.featured == true
                              or !#strings.isEmpty(platformLabel)
                              or !#strings.isEmpty(typeLabel)
                              or (project.tags != null and !project.tags.isEmpty())}">
                    <span class="portfolio-meta-group" th:if="${project.featured == true or !#strings.isEmpty(platformLabel) or !#strings.isEmpty(typeLabel)}">
                        <span th:if="${project.featured == true}" th:text="#{page.portfolio.featured}">Featured</span>
                        <span class="portfolio-card-label" th:if="${!#strings.isEmpty(platformLabel)}" th:text="|[${platformLabel}]|">[GitHub]</span>
                        <span class="portfolio-card-label" th:if="${!#strings.isEmpty(typeLabel)}" th:text="|[${typeLabel}]|">[Open Source]</span>
                    </span><span class="portfolio-meta-group post-tags portfolio-tags" th:if="${project.tags != null and !project.tags.isEmpty()}"><span class="post-tag portfolio-tag" th:each="tag : ${project.tags}" th:text="|#${tag}|">#tag</span></span>
                </span>
                <span class="portfolio-techs" th:if="${project.techStacks != null and !project.techStacks.isEmpty()}">
                    <span class="portfolio-term" th:each="tech : ${project.techStacks}" th:text="|[${tech}]|">[Rust]</span>
                </span>
            </div>
        </header>

        <section class="post-content portfolio-detail">
            <img th:if="${hasCover == true}" th:src="${project.cover}" th:alt="${project.title}" class="portfolio-detail-cover" />

            <blockquote class="portfolio-detail-summary" th:if="${hasSummary == true}" th:text="${project.summary}">
                Summary text here.
            </blockquote>

            <section class="portfolio-detail-section portfolio-detail-links" th:if="${hasRepoUrl == true or hasDemoUrl == true or hasDocsUrl == true}">
                <h2 th:text="#{page.portfolio.links}">Links</h2>
                <ul class="portfolio-link-list">
                    <li class="portfolio-link-row" th:if="${hasRepoUrl == true}">
                        <a class="portfolio-action button inline" th:href="${project.repoUrl}" target="_blank" rel="noopener noreferrer"
                           th:text="#{page.portfolio.repository}">Repository</a>
                        <span class="portfolio-link-url" th:text="${project.repoUrl}">https://github.com/example/repo</span>
                    </li>
                    <li class="portfolio-link-row" th:if="${hasDemoUrl == true}">
                        <a class="portfolio-action button inline" th:href="${project.demoUrl}" target="_blank" rel="noopener noreferrer"
                           th:text="#{page.portfolio.demo}">Demo</a>
                        <span class="portfolio-link-url" th:text="${project.demoUrl}">https://example.com</span>
                    </li>
                    <li class="portfolio-link-row" th:if="${hasDocsUrl == true}">
                        <a class="portfolio-action button inline" th:href="${project.docsUrl}" target="_blank" rel="noopener noreferrer"
                           th:text="#{page.portfolio.docs}">Docs</a>
                        <span class="portfolio-link-url" th:text="${project.docsUrl}">https://docs.example.com</span>
                    </li>
                </ul>
            </section>

            <section class="portfolio-detail-section" th:if="${hasRenderedContent == true}">
                <h2 th:text="#{page.portfolio.content}">Content</h2>
                <div class="portfolio-detail-content" th:utext="${projectContentHtml}"></div>
            </section>

            <div class="portfolio-detail-nav">
                <a data-pjax class="button inline portfolio-detail-back" th:href="@{/portfolio}">
                    <span th:text="'< ' + #{page.portfolio.back}">&lt; portfolio</span>
                </a>
            </div>
        </section>
    </article>
</th:block>
</html>
