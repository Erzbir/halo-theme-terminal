<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = ${site.title}, header = null, content = ~{::content}, footer = null)}"
>
<th:block th:fragment="content">
  <div class="content">
    <div class="index-content framed">
      <h1 class="typed-text" th:text="${theme.config.basic.index_notice_title}"></h1>
      <div th:utext="${theme.config.basic.index_notice_content}"></div>
    </div>
    <div class="posts">
      <article class="post on-list" th:each="post : ${posts.items}">
        <header>
          <h1 class="post-title">
            <a th:text="${post.spec.title}" th:href="@{${post.status.permalink}}">Post Title</a>
          </h1>
          <div class="post-meta">
            <span class="post-date" th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}">
              Publish Time
            </span>
            <span
              class="post-author"
              th:with="contributor = ${post.contributors[0]}"
              th:text="${contributor.displayName}"
            >Author</span
            >
          </div>
          <span class="post-tags">
            <span class="post-tag" th:each="tag : ${post.tags}">
              <a
                th:href="@{${tag.status.permalink}}"
                th:title="${tag.spec.displayName}"
                th:text="'#'+${tag.spec.displayName}"
              >#Tag
              </a>
            </span>
          </span>
        </header>
        <section class="post-content">
          <p th:text="${post.status.excerpt}">Post Excerpt...</p>
        </section>

        <section>
          <a class="read-more button inline" th:href="@{${post.status.permalink}}">[Read more]</a>
        </section>
      </article>
    </div>
    <div class="pagination" th:if="${posts.hasPrevious() || posts.hasNext()}">
      <div class="pagination__buttons">
          <span th:if="${posts.hasPrevious()}">
            <a th:href="@{${posts.prevUrl}}" class="button inline prev">
              <span class="button__icon"><</span>
              <span class="button__text">Prev</span>
            </a>
          </span>
        <span th:if="${posts.hasPrevious()} and${posts.hasNext()}">
          ::
        </span>
        <span th:if="${posts.hasNext()}">
            <a th:href="@{${posts.nextUrl}}" class="button inline next">
              <span class="button__text">Next</span>
              <span class="button__icon">></span>
            </a>
          </span>
      </div>
    </div>
  </div>
  <script>
    const typedTextContainer = document.querySelector('.typed-text');

    function typeWriter(container) {
      text = container.innerText;
      container.innerText = '';
      let i = 0;

      function type() {
        if (i < text.length) {
          container.innerHTML += text.charAt(i);
          i++;
          setTimeout(type, Math.random() * 200 + 50);
        }
      }

      type();
    }

    typeWriter(typedTextContainer);
  </script>
</th:block>
</html>
