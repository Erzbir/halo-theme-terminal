<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = |#{page.tags.title} - ${site.title}|, header = null, content = ~{::content}, footer = null)}"
>
<th:block th:fragment="content">
  <div class="content">
    <article class="post">
      <header>
        <h1 class="post-title">Tags</h1>
      </header>
      <section class="post-content">
        <ul class="post-tags">
          <li th:each="tag: ${tags}">
            <a class="post-tag" th:href="@{${tag.status.permalink}}"
               th:text="${tag.spec.displayName}+' ['+${tag.status.visiblePostCount?:0}+']'">
              n
            </a>
          </li>
        </ul>
      </section>
    </article>
  </div>
</th:block>
</html>
