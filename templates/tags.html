<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = |#{page.tags.title} - ${site.title}|, header = null, content = ~{::content}, footer = null)}"
>
<th:block th:fragment="content">
  <div class="content">
    <div class="terms">
      <h1 class="post-title">Tags</h1>
      <ul>
        <li th:each="tag: ${tags}">
          <a th:href="@{${tag.status.permalink}}"
             th:text="${tag.spec.displayName}+' ['+${tag.status.visiblePostCount?:0}+']'">
            n
          </a>
        </li>
      </ul>
    </div>
  </div>
</th:block>
</html>
